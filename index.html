<!DOCTYPE html>
<html>

<head>

    <title>INDSTAAL Intelligence Cockpit</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body{
            background:#f4f6f8;
            font-family:Arial;
        }

        .news-card{
            background:white;
            border-radius:16px;
            padding:14px;
            border:1px solid #e5e7eb;
            cursor:pointer;
            transition:all .25s ease;
            margin-bottom:12px;
        }

        .news-card:hover{
            transform:translateY(-4px);
            box-shadow:0 12px 30px rgba(0,0,0,.15);
        }

        .read{
            opacity:0.45;
            border:1px solid #cbd5e1 !important;
        }

        .tab-btn{
            padding:8px 14px;
            border-radius:10px;
            font-weight:600;
            border:1px solid #d1d5db;
            background:white;
            font-size:12px;
        }

        .tab-active{
            background:black;
            color:white;
        }

        #loader{
            position:fixed;
            inset:0;
            background:rgba(255,255,255,0.85);
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
            z-index:9999;
        }

        .spinner{
            width:45px;
            height:45px;
            border:4px solid #e5e7eb;
            border-top:4px solid black;
            border-radius:50%;
            animation:spin 0.9s linear infinite;
        }

        @keyframes spin{
            0%{transform:rotate(0deg);}
            100%{transform:rotate(360deg);}
        }

    </style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
    <div class="mt-2 text-sm text-gray-600">Loading Feed...</div>
</div>

<!-- HEADER -->
<div class="flex items-center justify-between px-4 py-3 bg-black text-white">

    <div class="font-bold">
        INDSTAAL Intelligence Cockpit
    </div>

    <div class="text-green-400 text-xs">
        LIVE
    </div>

</div>

<!-- FILTER BAR -->
<div class="p-2 flex gap-2 flex-wrap">

    <button class="tab-btn tab-active" onclick="setFilter(3)">Latest 3 Days</button>
    <button class="tab-btn" onclick="setFilter(15)">15 Days</button>
    <button class="tab-btn" onclick="setFilter(30)">1 Month</button>
    <button class="tab-btn" onclick="setFilter(60)">2 Months</button>
    <button class="tab-btn" onclick="setFilter(90)">3 Months</button>

</div>

<!-- SUMMARY -->
<div class="p-3">
    <div id="summary" class="bg-white p-3 rounded shadow text-sm"></div>
</div>

<!-- FEEDS -->
<div class="p-3 grid grid-cols-2 gap-3">

    <div>
        <h3 class="font-bold mb-2">Opportunities + Infra</h3>
        <div id="feed_left"></div>
    </div>

    <div>
        <h3 class="font-bold mb-2">Competitors + Steel</h3>
        <div id="feed_right"></div>
    </div>

</div>

<script>

/* ---------------- FILTER STATE ---------------- */

let filterDays = 3;

/* ---------------- READ SYSTEM ---------------- */

let readNews = new Set(
    JSON.parse(localStorage.getItem("read_news") || "[]")
);

/* ---------------- DATE PARSE ---------------- */

function isWithinDays(dateStr, days){

    if(!dateStr) return true;

    let d = new Date(dateStr);
    if(isNaN(d)) return true;

    let diff = (new Date() - d) / (1000*60*60*24);

    return diff <= days;
}

/* ---------------- FILTER CONTROL ---------------- */

function setFilter(days){

    filterDays = days;

    document.querySelectorAll(".tab-btn").forEach(b => {
        b.classList.remove("tab-active");
    });

    event.target.classList.add("tab-active");

    renderAll();
}

/* ---------------- DATA ---------------- */

let leftData = [];
let rightData = [];

const PAGE_SIZE = 10;

/* ---------------- CLICK ---------------- */

function openNews(link){

    readNews.add(link);
    localStorage.setItem("read_news", JSON.stringify([...readNews]));

    renderAll();

    window.open(link, "_blank");
}

/* ---------------- RENDER ---------------- */

function renderCards(container, data){

    let filtered = data.filter(i => isWithinDays(i.date, filterDays));

    let html = filtered.map(i => {

        const isRead = readNews.has(i.link);

        return `
        <div class="news-card ${isRead ? 'read' : ''}"
             onclick="openNews('${i.link}')">

            <div class="font-semibold mb-2">${i.title}</div>

            <div class="text-xs text-gray-500">
                ${i.date || "Recent"} | ${i.tag || ""}
            </div>

        </div>
        `;
    }).join("");

    document.getElementById(container).innerHTML = html;
}

/* ---------------- RENDER ALL ---------------- */

function renderAll(){

    renderCards("feed_left", leftData);
    renderCards("feed_right", rightData);
}

/* ---------------- LOAD ---------------- */

async function loadData(){

    document.getElementById("loader").style.display="flex";

    const res = await fetch("/api/dashboard");
    const data = await res.json();

    leftData = [
        ...(data.opportunities || []),
        ...(data.infra || [])
    ];

    rightData = [
        ...(data.competitors || []),
        ...(data.steel || [])
    ];

    document.getElementById("summary").innerHTML =
        `Opportunities: ${data.opportunities?.length || 0} |
         Competitors: ${data.competitors?.length || 0}`;

    renderAll();

    document.getElementById("loader").style.display="none";
}

loadData();

setInterval(loadData, 60000);

</script>

</body>
</html>
