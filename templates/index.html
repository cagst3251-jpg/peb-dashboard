<!DOCTYPE html>
<html>

<head>

    <title>INDSTAAL Intelligence Cockpit</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>

        body{
            background:#f4f6f8;
            font-family:Arial;
        }

        .news-card{
            background:white;
            border-radius:16px;
            padding:14px;
            border:1px solid #e5e7eb;
            cursor:pointer;
            transition:all .25s ease;
            margin-bottom:12px;
        }

        .news-card:hover{
            transform:translateY(-4px);
            box-shadow:0 12px 30px rgba(0,0,0,.15);
        }

        .read{
            opacity:0.45;
            border:1px solid #cbd5e1 !important;
        }

        .tag{
            display:inline-block;
            padding:4px 10px;
            border-radius:20px;
            font-size:11px;
            font-weight:bold;
        }

        .tab-btn{
            padding:10px 18px;
            border-radius:10px;
            font-weight:600;
            border:1px solid #d1d5db;
            background:white;
        }

        .tab-active{
            background:black;
            color:white;
        }

        /* LOADER */
        #loader{
            position:fixed;
            inset:0;
            background:rgba(255,255,255,0.85);
            display:flex;
            align-items:center;
            justify-content:center;
            flex-direction:column;
            z-index:9999;
        }

        .spinner{
            width:45px;
            height:45px;
            border:4px solid #e5e7eb;
            border-top:4px solid black;
            border-radius:50%;
            animation:spin 0.9s linear infinite;
        }

        @keyframes spin{
            0%{transform:rotate(0deg);}
            100%{transform:rotate(360deg);}
        }

    </style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
    <div class="mt-3 text-sm text-gray-600">
        Loading Intelligence Feed...
    </div>
</div>

<!-- HEADER -->
<div class="flex items-center justify-between px-4 py-3 bg-gradient-to-r from-black via-gray-900 to-black shadow-lg">

    <div class="flex items-center gap-3">

        <img src="/static/indstaal-logo.png"
             class="h-10 bg-white p-1 rounded">

        <div class="text-white">
            <div class="font-bold text-lg">
                INDSTAAL Intelligence Cockpit
            </div>
            <div class="text-xs text-gray-400">
                Real-time Market Intelligence System
            </div>
        </div>

    </div>

    <div class="text-green-400 text-xs font-semibold">
        🟢 LIVE
    </div>

</div>

<!-- SUMMARY -->
<div class="p-3">
    <div id="summary"
         class="bg-white p-4 rounded-xl shadow text-sm"></div>
</div>

<!-- TABS -->
<div class="px-3">

    <div class="flex gap-2 mb-4">

        <button id="tab1btn"
                class="tab-btn tab-active"
                onclick="showTab('tab1')">
            Opportunities + Infra
        </button>

        <button id="tab2btn"
                class="tab-btn"
                onclick="showTab('tab2')">
            Competitors + Steel
        </button>

    </div>

    <div id="tab1">
        <div id="feed_left"></div>
    </div>

    <div id="tab2" style="display:none;">
        <div id="feed_right"></div>
    </div>

</div>

<script>

/* ---------------- LOADER ---------------- */

function showLoader(){ document.getElementById("loader").style.display="flex"; }
function hideLoader(){ document.getElementById("loader").style.display="none"; }

/* ---------------- READ SYSTEM ---------------- */

let readNews = new Set(
    JSON.parse(localStorage.getItem("read_news") || "[]")
);

function markAsRead(link){
    readNews.add(link);
    localStorage.setItem("read_news", JSON.stringify([...readNews]));
}

/* ---------------- SORT ENGINE (FIX) ---------------- */

function sortFeed(data){

    return data.sort((a, b) => {

        const aRead = readNews.has(a.link) ? 1 : 0;
        const bRead = readNews.has(b.link) ? 1 : 0;

        return aRead - bRead; // unread first
    });

}

/* ---------------- STATE ---------------- */

let leftData = [];
let rightData = [];

let leftIndex = 0;
let rightIndex = 0;

const PAGE_SIZE = 10;

/* ---------------- TAB ---------------- */

function showTab(tab){

    document.getElementById("tab1").style.display="none";
    document.getElementById("tab2").style.display="none";

    document.getElementById("tab1btn").className="tab-btn";
    document.getElementById("tab2btn").className="tab-btn";

    if(tab==="tab1"){
        document.getElementById("tab1").style.display="block";
        document.getElementById("tab1btn").className="tab-btn tab-active";
    }

    if(tab==="tab2"){
        document.getElementById("tab2").style.display="block";
        document.getElementById("tab2btn").className="tab-btn tab-active";
    }
}

/* ---------------- CLICK ---------------- */

function openNews(link){

    markAsRead(link);

    rerenderFeeds();   // 🔥 IMPORTANT FIX

    window.open(link, "_blank");
}

/* ---------------- RERENDER ---------------- */

function rerenderFeeds(){

    document.getElementById("feed_left").innerHTML = "";
    document.getElementById("feed_right").innerHTML = "";

    leftIndex = 0;
    rightIndex = 0;

    loadMore();
}

/* ---------------- RENDER ---------------- */

function renderCards(container, data, start){

    const chunk = data.slice(start, start + PAGE_SIZE);

    const html = chunk.map(i => {

        const isRead = readNews.has(i.link);

        return `
        <div class="news-card ${isRead ? 'read' : ''}"
             data-link="${i.link}"
             onclick="openNews('${i.link}')">

            <div class="flex justify-between mb-2">

                <span class="tag bg-gray-100 text-gray-700">
                    ${i.tag || "NEWS"}
                </span>

                <span class="text-xs text-gray-400">
                    ${i.date || "Recent"}
                </span>

            </div>

            <div class="font-semibold mb-2">
                ${i.title}
            </div>

            <div class="text-sm text-gray-600">
                ${i.insight || ""}
            </div>

            <div class="mt-2 text-xs text-gray-500">
                🚨 ${i.impact || "MEDIUM"} | 🎯 ${i.score || 0}
            </div>

        </div>
        `;
    }).join("");

    document.getElementById(container)
        .insertAdjacentHTML("beforeend", html);
}

/* ---------------- LOAD DATA ---------------- */

async function loadData(){

    showLoader();

    const res = await fetch("/api/dashboard");
    const data = await res.json();

    document.getElementById("summary").innerHTML = `
        🟢 Opportunities: ${data.opportunities?.length || 0}
        | 🔴 Competitors: ${data.competitors?.length || 0}
        | 🔵 Steel: ${data.steel?.length || 0}
        | 🟣 Infra: ${data.infra?.length || 0}
    `;

    leftData = sortFeed([
        ...(data.opportunities || []),
        ...(data.infra || [])
    ]);

    rightData = sortFeed([
        ...(data.competitors || []),
        ...(data.steel || [])
    ]);

    document.getElementById("feed_left").innerHTML = "";
    document.getElementById("feed_right").innerHTML = "";

    leftIndex = 0;
    rightIndex = 0;

    loadMore();

    hideLoader();
}

/* ---------------- INFINITE SCROLL ---------------- */

function loadMore(){

    renderCards("feed_left", leftData, leftIndex);
    renderCards("feed_right", rightData, rightIndex);

    leftIndex += PAGE_SIZE;
    rightIndex += PAGE_SIZE;
}

window.addEventListener("scroll", () => {

    const nearBottom =
        window.innerHeight + window.scrollY
        >= document.body.offsetHeight - 200;

    if(nearBottom){
        loadMore();
    }

});

/* ---------------- INIT ---------------- */

loadData();

setInterval(loadData, 60000);

</script>

</body>
</html>
