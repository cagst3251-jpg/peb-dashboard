<!DOCTYPE html>
<html>

<head>
    <title>INDSTAAL Intelligence Cockpit</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #f4f6f8;
            font-family: Arial;
        }

        .scroll {
            max-height: 85vh;
            overflow-y: auto;
        }

        .card:hover {
            transform: translateY(-2px);
            transition: 0.2s;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="flex items-center justify-between px-4 py-3 bg-gradient-to-r from-black via-gray-900 to-black shadow-lg">

    <!-- LEFT: LOGO + BRAND -->
    <div class="flex items-center gap-3">

        <!-- LOGO WITH FALLBACK -->
        <img src="/static/indstaal-logo.png" class="h-10 bg-white p-1 rounded">

        <div>
            <div class="text-white font-bold text-lg tracking-wide">
                INDSTAAL Intelligence Cockpit
            </div>
            <div class="text-gray-400 text-xs">
                PEB Market Radar • Opportunity Detection System
            </div>
        </div>

    </div>

    <!-- RIGHT: STATUS -->
    <div class="flex items-center gap-2">

        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>

        <span class="text-green-400 text-xs font-semibold">
            LIVE
        </span>

        <span class="text-gray-400 text-xs">
            Auto Refresh 60s
        </span>

    </div>

</div>
<!-- TOP SUMMARY -->
<div class="p-3">
    <div class="bg-white p-3 rounded-xl shadow text-sm" id="summary">
        Loading summary...
    </div>
</div>

<!-- MAIN 50/50 LAYOUT -->
<div class="grid grid-cols-2 gap-3 p-3">

    <!-- LEFT FEED -->
    <div class="bg-white p-3 rounded-xl shadow scroll">

        <h2 class="font-bold text-green-700 mb-2">
            🔥 Opportunities + Infra Feed
        </h2>

        <div id="feed_left" class="text-xs"></div>

    </div>

    <!-- RIGHT FEED -->
    <div class="bg-white p-3 rounded-xl shadow scroll">

        <h2 class="font-bold text-red-700 mb-2">
            🔴 Competitors + Steel Feed
        </h2>

        <div id="feed_right" class="text-xs"></div>

    </div>

</div>

<script>

async function loadData() {

    const res = await fetch("/api/dashboard");
    const data = await res.json();

    // SUMMARY
    document.getElementById("summary").innerHTML = `
        🟢 Opportunities: ${data.opportunities?.length || 0}
        | 🔴 Competitors: ${data.competitors?.length || 0}
        | 🔵 Steel: ${data.steel?.length || 0}
        | 🟣 Infra: ${data.infra?.length || 0}
        <br>
        <b>Top Signal:</b> ${data.top_opportunities?.[0]?.title || "No signal"}
    `;

    // LEFT FEED (Opportunities + Infra)
    let left = [
        ...(data.opportunities || []),
        ...(data.infra || [])
    ];

    document.getElementById("feed_left").innerHTML =
        left.map(i => `
            <div class="border p-2 rounded mb-2 bg-gray-50">

                <div class="font-semibold text-gray-800">
                    ${i.title}
                </div>

                <div class="text-gray-600 mt-1">
                    ${i.insight}
                </div>

                <!-- FIXED DATE DISPLAY -->
                <div class="text-gray-400 mt-1 text-xs">
                    🕒 ${i.date || "Recent"}
                </div>

                <div class="text-gray-500 mt-1">
                    🚨 ${i.impact} | 📌 ${i.tag} | 🎯 ${i.score}
                </div>

                <div class="mt-2">
                    <a href="${i.link}" target="_blank"
                       class="bg-blue-600 text-white px-2 py-1 rounded text-xs">
                        Open
                    </a>
                </div>

            </div>
        `).join("");

    // RIGHT FEED (Competitors + Steel)
    let right = [
        ...(data.competitors || []),
        ...(data.steel || [])
    ];

    document.getElementById("feed_right").innerHTML =
        right.map(i => `
            <div class="border p-2 rounded mb-2 bg-gray-50">

                <div class="font-semibold text-gray-800">
                    ${i.title}
                </div>

                <div class="text-gray-600 mt-1">
                    ${i.insight}
                </div>

                <!-- FIXED DATE DISPLAY -->
                <div class="text-gray-400 mt-1 text-xs">
                    🕒 ${i.date || "Recent"}
                </div>

                <div class="text-gray-500 mt-1">
                    🚨 ${i.impact} | 📌 ${i.tag} | 🎯 ${i.score}
                </div>

                <div class="mt-2">
                    <a href="${i.link}" target="_blank"
                       class="bg-red-600 text-white px-2 py-1 rounded text-xs">
                        Open
                    </a>
                </div>

            </div>
        `).join("");

}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
