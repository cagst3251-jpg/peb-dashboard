<!DOCTYPE html>
<html>
<head>
  <title>INDSTAAL Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="p-4 bg-black text-white text-xl font-bold">
  🏗 INDSTAAL Intelligence Dashboard
</div>

<div class="p-4">

  <div id="summary" class="mb-4 font-bold"></div>

  <div class="grid grid-cols-2 gap-4">

    <div>
      <h2 class="font-bold">Alerts</h2>
      <div id="alerts"></div>
    </div>

    <div>
      <h2 class="font-bold">Opportunities</h2>
      <div id="opportunities"></div>
    </div>

    <div>
      <h2 class="font-bold">Competitors</h2>
      <div id="competitors"></div>
    </div>

    <div>
      <h2 class="font-bold">Steel</h2>
      <div id="steel"></div>
    </div>

  </div>
</div>

<script>

async function loadData() {

  const res = await fetch("/api/dashboard");
  const data = await res.json();

  document.getElementById("summary").innerText = data.summary;

  function render(id, items) {
    document.getElementById(id).innerHTML =
      items.map(i =>
        `<div class="bg-white p-2 m-2 rounded shadow">
          <a href="${i.link}" target="_blank">${i.title}</a>
        </div>`
      ).join("");
  }

  render("alerts", data.alerts);
  render("opportunities", data.opportunities);
  render("competitors", data.competitors);
  render("steel", data.steel);
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
